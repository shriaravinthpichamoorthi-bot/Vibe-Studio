ows available times for the selected date","Booking created in Supabase with status pending","Trainer sees the booking in their dashboard","Client sees the booking in their dashboard"]},{"id":6,"title":"Stripe Connect and payment at booking","feature":"Stripe payment at booking","depends_on":[1,2,3,4,5],"delivers":"Trainers complete Stripe Connect onboarding. Clients pay at time of booking — funds held and released to trainer after session is marked complete","complexity":"complex","done_when":["Stripe Connect onboarding flow works for trainers","Booking creation triggers a Stripe PaymentIntent","Client completes payment via Stripe Checkout","Booking status updates to confirmed after payment","Platform fee (10%) deducted from trainer payout","Trainer payout triggered when session is marked complete"]},{"id":7,"title":"Reviews, emails, and cancellation","feature":"Reviews + Emails + Cancellation","depends_on":[1,2,3,4,5,6],"delivers":"Booking confirmation emails to both parties, cancellation with refund logic, and a review prompt after session completion","complexity":"complex","done_when":["Trainer and client receive confirmation email on booking","Cancellation 24h+ before triggers full Stripe refund","Cancellation under 24h triggers no refund","Client receives review request email after session completes","Review form saves rating and comment","Trainer's average rating updates on public profile"]}],"prompts":[{"chunk_id":1,"prompt":"Create a Next.js 14 project with App Router and Supabase. Implement email/password authentication with a role selection step on signup — users choose either 'I am a trainer' or 'I am a client'. On signup, create a profiles row: id, user_id (references auth.users), role ('trainer' or 'client'), full_name, avatar_url (nullable), bio (nullable), city (nullable), stripe_account_id (nullable), stripe_onboarded (boolean, default false), created_at.\n\nCreate middleware.ts that: redirects unauthenticated users to /login from any protected route, redirects trainers from /dashboard/client to /dashboard/trainer, and redirects clients from /dashboard/trainer to /dashboard/client. Create placeholder dashboard pages showing the user's role and name.\n\nInstall Tailwind CSS. Design the landing page with a hero section containing a city search input and a 'Find a trainer' CTA button. The page should look professional — this marketplace needs to earn trust from both trainers and clients on first view."},{"chunk_id":2,"prompt":"Build trainer onboarding and public profile. Create a multi-step onboarding flow at /onboarding/trainer: Step 1 — Basic info (full name, bio up to 300 chars, phone number). Step 2 — Location (city, area/neighbourhood). Step 3 — Specialities (multi-select: Strength Training, HIIT, Weight Loss, Yoga, Pilates, Boxing, Mobility, Sports Performance). Step 4 — Profile photo upload.\n\nStore photos in Supabase Storage under an 'avatars' bucket. Generate a unique slug from the trainer's full name and save it to profiles. Redirect to /dashboard/trainer after onboarding.\n\nBuild the public profile page at /trainers/[slug]. Show: profile photo, full name, city, bio, speciality badges, average star rating (placeholder for now), and a Book a Session CTA. Render server-side for SEO. Add Open Graph meta tags using the trainer's name and bio."},{"chunk_id":3,"prompt":"Build session type creation and availability management. Create session_types: id, trainer_id, name, description, duration_minutes, price_cents, is_active, created_at. RLS: trainers manage their own session types only.\n\nCreate availability_slots: id, trainer_id, day_of_week (0=Monday to 6=Sunday), start_time, end_time, is_active. RLS: trainers manage their own slots.\n\nIn the trainer dashboard, add two sections. Session Types: list with Edit/Deactivate controls and an Add Session Type button that opens a form with name, description, duration (30/45/60/90 min dropdown), and price. Availability: a 7-column weekly grid where each column has toggle-able time blocks (6am–8am, 8am–10am, etc.). Toggling saves or removes the slot in Supabase. Both session types and availability slots must appear on the public trainer profile."},{"chunk_id":4,"prompt":"Build the client-facing trainer discovery experience. The /trainers page fetches all trainers who have completed onboarding (at least one session type and one availability slot) and shows them as a responsive card grid.\n\nEach card shows: profile photo, full name, city, top 2 speciality badges, star rating (or 'New' if no reviews), starting price, and days available this week.\n\nAdd a search and filter bar: city text search, speciality multi-select dropdown, and a price range slider. Filters update the list without a page reload using URL search params so results are shareable.\n\nThe landing page city search navigates to /trainers?city=X with the search pre-applied. Use server-side rendering with Suspense and skeleton cards as fallback."},{"chunk_id":5,"prompt":"Build the session booking flow on the trainer's public profile. Below the trainer's bio and session types, add a booking widget. Step 1: client selects a session type. Step 2: a date picker shows only days the trainer has marked as available. Step 3: available time slots for the selected date appear, excluding already-booked times. Step 4: a confirmation screen shows session details and a Confirm Booking button.\n\nOn confirm, create a booking row: session_type_id, trainer_id, client_id, scheduled_at, duration_minutes, price_cents, status ('pending'), created_at. Redirect to /dashboard/client after booking.\n\nIn /dashboard/trainer, show upcoming bookings with client name, session type, date/time, and a Mark Complete button. In /dashboard/client, show upcoming bookings with trainer name, session type, date/time, and a Cancel button."},{"chunk_id":6,"prompt":"Implement Stripe Connect for trainer payouts and payment at booking. Build Stripe Connect onboarding in /dashboard/trainer: show a Connect Stripe Account banner if stripe_onboarded is false. Clicking creates a Stripe Connect account and returns an onboarding URL. Handle the return redirect, verify the account is active, then update stripe_account_id and stripe_onboarded.\n\nAdd payment to the booking flow. After the client confirms, create a Stripe PaymentIntent with application_fee_amount set to 10% of the session price. Return the client secret and show Stripe's payment element inline. On payment success, update booking status to 'confirmed'.\n\nCreate a webhook at /api/webhooks/stripe handling: payment_intent.succeeded (confirm booking) and payment_intent.payment_failed (cancel booking). When a trainer marks a session complete, trigger a Stripe transfer of 90% to their connected account."},{"chunk_id":7,"prompt":"Build emails, cancellation flow, and the review system using Resend. Send emails for: booking confirmed (to trainer and client with session type, date, time, location), booking cancelled (to both parties with refund status), session complete + review request (to client 1 hour after session end).\n\nCancellation: if more than 24 hours before the session, issue a full Stripe refund and update status to 'cancelled'. If under 24 hours, no refund — show a clear warning before confirming. Trainers always trigger a full refund regardless of timing.\n\nReview system: create the reviews table. After clicking the review link in the email, client lands on /review/[bookingId] with a star rating and optional comment form. On submit, save the review. Update the trainer's average rating on their public profile and in search results."}],"launch_checklist":{"categories":[{"name":"Environment","mandatory":true,"items":[{"task":"All environment variables configured in Vercel production","explanation":"Missing variables will crash bookings, payments, or emails silently. Verify each one is present and correct."},{"task":"STRIPE_CONNECT_CLIENT_ID set for production (not test) Stripe account","explanation":"Connect onboarding uses this ID to link trainer accounts to your platform. Test and live IDs are different."},{"task":"Supabase Storage bucket 'avatars' set to public read","explanation":"Trainer profile photos must be publicly accessible for profile pages to render correctly."}]},{"name":"Database","mandatory":false,"items":[{"task":"RLS verified on bookings, reviews, and profiles tables","explanation":"Clients must only see their own bookings. Trainers must only see bookings assigned to them. Misconfigured RLS is a serious data leak."},{"task":"Availability slot timezone handling confirmed correct","explanation":"A trainer setting 9am slots must mean 9am in their local time. Verify timezones are stored and displayed correctly."}]},{"name":"Auth","mandatory":true,"items":[{"task":"Supabase Auth redirect URLs updated to production domain","explanation":"Email confirmation links point to localhost if this isn't updated — new users can't verify their accounts."},{"task":"Role assignment tested — trainers cannot access client dashboard and vice versa","explanation":"Test both roles in production. A bug here means trainers could see client booking data or vice versa."}]},{"name":"Payments","mandatory":true,"items":[{"task":"Stripe Connect live mode configured and tested end-to-end","explanation":"Complete the full trainer onboarding → client booking → payment → trainer payout flow with real amounts before launch."},{"task":"Platform fee percentage confirmed in code and Stripe dashboard","explanation":"The application_fee_amount in your PaymentIntent must match what you've communicated to trainers."},{"task":"Stripe webhook registered for production URL with correct events","explanation":"Subscribe to: payment_intent.succeeded, payment_intent.payment_failed, and account.updated."}]},{"name":"Security","mandatory":true,"items":[{"task":"Stripe webhook signature verification implemented","explanation":"Without this, anyone can POST to your webhook endpoint and fake payment confirmations. Verify the Stripe-Signature header on every request."},{"task":"Trainers cannot access other trainers' earnings or booking data","explanation":"Test by creating two trainer accounts and trying to access each other's dashboard data directly via API."},{"task":"Public profile pages do not expose trainer's email or phone number","explanation":"The /trainers/[slug] page must not return contact details — clients book through the platform, not directly."}]},{"name":"Launch","mandatory":false,"items":[{"task":"Full booking flow tested: discovery → profile → book → pay → confirm → complete → review","explanation":"Walk the entire user journey as a client with a real trainer account on production before opening to the public."},{"task":"Mobile booking flow tested on iOS and Android","explanation":"Most clients will book on their phone. The time slot picker and Stripe payment form must work perfectly on mobile."},{"task":"Cancellation and refund flow tested for both timing scenarios","explanation":"Test a cancellation 25+ hours before and one under 24 hours. Confirm refunds appear in Stripe and emails sent correctly."}]}]}}};

// ── STATE ──
let ideaKey = 'invoice';
let phase = 'ideation';
let unlocked = ['ideation'];
let dec = {};
let clState = {};
let techView = false;
let animating = false;

const PHASES = [
  {id:'ideation',label:'Ideation'},
  {id:'features',label:'Feature Scoping'},
  {id:'agent',label:'Agent Selection'},
  {id:'stack',label:'Stack & Architecture'},
  {id:'chunks',label:'Build Chunking'},
  {id:'prompts',label:'Prompt Generation'},
  {id:'launch',label:'Launch Checklist'},
];

const AGENTS = [
  {id:'cursor',name:'Cursor',type:'step',desc:'File-aware editor. Focused chunks, great for iterating and course-correcting as you go.'},
  {id:'claude_code',name:'Claude Code',type:'step',desc:'Terminal-based agentic AI. Handles larger multi-file tasks autonomously.'},
  {id:'windsurf',name:'Windsurf',type:'step',desc:'Editor-based agent with deep codebase context. Works well with medium-sized chunks.'},
  {id:'bolt',name:'Bolt',type:'shot',desc:'Browser-based full-stack generator. Great for generating whole app slices in one prompt.'},
  {id:'lovable',name:'Lovable',type:'shot',desc:'Chat-driven app generator. Describe your product and it builds the structure and hosting.'},
  {id:'v0',name:'v0',type:'shot',desc:'UI-first generator from Vercel. Excellent for React components and frontend-heavy apps.'},
];

// ── HELPERS ──
const $=id=>document.getElementById(id);
const d=()=>DATA[ideaKey];

function delay(ms){return new Promise(r=>setTimeout(r,ms))}

async function typeText(el, text, speed=18){
  el.textContent='';
  el.classList.add('typing');
  for(let i=0;i<text.length;i++){
    el.textContent+=text[i];
    await delay(speed+Math.random()*10);
  }
  el.classList.remove('typing');
}

async function fadeIn(el,ms=200){
  el.style.opacity='0';
  el.style.display='';
  await delay(10);
  el.style.transition=`opacity ${ms}ms`;
  el.style.opacity='1';
  await delay(ms);
}

// ── NAV ──
function renderNav(){
  $('phase-nav').innerHTML=PHASES.map((p,i)=>{
    const pidx=PHASES.findIndex(x=>x.id===phase);
    const idx=i;
    const isActive=p.id===phase;
    const isDone=unlocked.includes(p.id)&&idx<pidx;
    const isLocked=!unlocked.includes(p.id);
    return `<div class="pni ${isActive?'active':''} ${isDone?'done':''} ${isLocked?'locked':''}" onclick="goPhase('${p.id}')">
      <div class="pni-dot">${isDone?'✓':i+1}</div>
      <div class="pni-label">${p.label}</div>
    </div>`;
  }).join('');
}

function renderDec(){
  const data=d();
  const agent=dec.agent||null;
  const agentNames={cursor:'Cursor',claude_code:'Claude Code',windsurf:'Windsurf',bolt:'Bolt',lovable:'Lovable',v0:'v0'};
  const items=[
    {k:'Product',v:{invoice:'Invoice Tracker',apicost:'API Cost Monitor',fitness:'Fitness Marketplace'}[ideaKey],always:true},
    {k:'Agent',v:agent?agentNames[agent]:null},
    {k:'Frontend',v:dec.stack?data.stack.layers[0].choice:null},
    {k:'Database',v:dec.stack?data.stack.layers[2].choice:null},
    {k:'Payments',v:dec.stack?data.stack.layers[5].choice:null},
    {k:'Chunks',v:dec.chunks?`${data.chunks.length} total`:null},
  ];
  $('decisions').innerHTML=items.map(i=>`<div class="dec-item">
    <div class="dec-key">${i.k}</div>
    <div class="dec-val ${i.v?'set':'empty'}">${i.v||'—'}</div>
  </div>`).join('');
}

function goPhase(id){
  if(!unlocked.includes(id)||animating)return;
  phase=id;
  renderNav();
  renderPhase(id);
  $('main').scrollTop=0;
}

function advance(to){
  if(!unlocked.includes(to))unlocked.push(to);
  phase=to;
  renderNav();
  renderDec();
  renderPhase(to);
  $('main').scrollTop=0;
}

// ── MAIN RENDER ──
function renderPhase(id){
  const main=$('main');
  main.innerHTML='';
  const wrap=document.createElement('div');
  wrap.className='panel active';
  if(id==='ideation')wrap.innerHTML=buildIdeation();
  else if(id==='features')wrap.innerHTML=buildFeatures();
  else if(id==='agent')wrap.innerHTML=buildAgent();
  else if(id==='stack')wrap.innerHTML=buildStack();
  else if(id==='chunks')wrap.innerHTML=buildChunks();
  else if(id==='prompts')wrap.innerHTML=buildPrompts();
  else if(id==='launch')wrap.innerHTML=buildLaunch();
  main.appendChild(wrap);

  if(id==='ideation')runIdeationTutorial();
  if(id==='features')runFeaturesTutorial();
}

function buildIdeation(){
  return `
  ${narrationCard('ideation')}
  <div class="phase-eyebrow">Phase 01 · Ideation</div>
  <div class="phase-title">What's your idea? ${qBtn('ideation')}</div>
  <div class="phase-desc">Start with your raw idea — as vague as you like. We'll help you turn it into a clear product foundation.</div>

  <div class="card">
    <div class="card-hd">Your idea</div>
    <textarea class="ti" id="idea-ta" rows="3" placeholder="Describe your idea in plain English..." style="margin-bottom:.625rem"></textarea>
    <div style="display:flex;justify-content:flex-end">
      <button class="btn btn-primary" id="idea-btn" onclick="submitIdea()" disabled>Analyse my idea →</button>
    </div>

    <div class="card">
      <div class="card-hd">

      </div>

    <div class="card">
      <div class="card-hd">
        <span class="inline-spinner" id="kernel-spinner"></span>
        <span id="kernel-hd-txt">Synthesising your product kernel...</span>
      </div>
      <div id="kernel-rows"></div>
    </div>
  </div>

  <div id="analysis-section" class="hidden">
    <div class="card">
      <div class="card-hd">
        <span class="inline-spinner" id="ana-spinner"></span>
        <span id="ana-hd-txt">Analysing your idea...</span>
      </div>
      <div id="ana-items"></div>
    </div>
  </div>

  <div id="ideation-cta" class="hidden btn-row">
    <button class="btn btn-primary" onclick="advance('features')">Lock ideation & continue →</button>
  </div>`;
}

async function runIdeationTutorial(){
  const ta=$('idea-ta');
  const btn=$('idea-btn');
  const raw=d().raw;
  animating=true;
  await delay(500);
  // type the idea
  btn.disabled=true;
  ta.value='';
  for(let i=0;i<raw.length;i++){
    ta.value+=raw[i];
    if(ta.value.length>3)btn.disabled=false;
    await delay(22+Math.random()*12);
  }
  await delay(600);
  btn.disabled=false;
  animating=false;
}

async function submitIdea(){
  if(animating)return;
  animating=true;
  const qs=$('qa-section');
  qs.classList.remove('hidden');
  await delay(300);

  const spinner=$('qa-spinner');
  const hdTxt=$('qa-hd-txt');
  const items=$('qa-items');
  const cta=$('qa-cta');

  const questions=d().ideation.questions;
  const answers=d().ideation.answers;

  await delay(1200);
  spinner.style.display='none';
  hdTxt.textContent='Clarifying questions';

  for(let i=0;i<questions.length;i++){
    await delay(300);
    const item=document.createElement('div');
    item.className='qa-item';
    item.innerHTML=`<div class="qa-q">
      <div class="qa-qnum">${i+1}</div>
      <div class="qa-qtext">${questions[i]}</div>
    </div>
    <div class="qa-ans" id="ans-${i}" contenteditable="true"></div>`;
    items.appendChild(item);
    await delay(200);
    const ansEl=$(`ans-${i}`);
    await typeText(ansEl,answers[i],14);
    await delay(200);
  }
  await delay(300);
  cta.classList.remove('hidden');
  animating=false;
}

async function goToKernel(){
  if(animating)return;
  animating=true;
  const ks=$('kernel-section');
  ks.classList.remove('hidden');
  await delay(400);

  const spinner=$('kernel-spinner');
  const hdTxt=$('kernel-hd-txt');
  const rows=$('kernel-rows');

  await delay(1000);
  spinner.style.display='none';
  hdTxt.textContent='Product kernel';

  const kernel=d().ideation.kernel;
  const labels={problem:'Problem',solution:'Solution',target_user:'Target user',value_prop:'Value prop',out_of_scope:'Out of scope',success_metric:'Success metric'};

  for(const [k,v] of Object.entries(kernel)){
    await delay(180);
    const row=document.createElement('div');
    row.className='kernel-row';
    row.innerHTML=`<div class="kr-key">${labels[k]||k}</div><div class="kr-val" id="kr-${k}" contenteditable="true"></div>`;
    rows.appendChild(row);
    await delay(80);
    const el=$(`kr-${k}`);
    el.classList.add('typing');
    await typeText(el,v,10);
    el.classList.remove('typing');
  }

  await delay(400);
  await runAnalysis();
}

async function runAnalysis(){
  const as=$('analysis-section');
  as.classList.remove('hidden');
  await delay(400);

  const spinner=$('ana-spinner');
  const hdTxt=$('ana-hd-txt');
  const items=$('ana-items');

  await delay(900);
  spinner.style.display='none';
  hdTxt.textContent='Idea analysis';

  const analysis=d().ideation.analysis;
  for(const a of analysis){
    await delay(250);
    const el=document.createElement('div');
    el.className=`ana-item ana-${a.type}`;
    el.innerHTML=`<div class="ana-icon">${a.type==='strong'?'✓':a.type==='weak'?'!':'⚠'}</div>
    <div class="ana-body"><strong>${a.title}</strong><span>${a.detail}</span></div>`;
    items.appendChild(el);
  }

  await delay(400);
  $('ideation-cta').classList.remove('hidden');
  animating=false;
}

function buildFeatures(){
  return `

async function runFeaturesTutorial(){
  animating=true;
  const f=d().features;

  async function showFeatures(containerId, items){
    const el=$(containerId);
    for(const fi of items){
      await delay(120);
      const div=document.createElement('div');
      div.className='fi';
      div.innerHTML=`<span class="fi-cx cx-${fi.complexity}">${fi.complexity}</span>
      <div><div class="fi-name">${fi.name}</div><div class="fi-desc">${fi.description} — <em style="color:var(--text4)">${fi.why}</em></div></div>`;
      el.appendChild(div);
    }
  }

  await delay(300);
  const coreCard=$('feat-core-card');
  coreCard.style.transition='opacity .3s';coreCard.style.opacity='1';
  await showFeatures('feat-core',f.core);

  await delay(300);
  const shouldCard=$('feat-should-card');
  shouldCard.style.transition='opacity .3s';shouldCard.style.opacity='1';
  await showFeatures('feat-should',f.should_have);

  await delay(200);
  const niceCard=$('feat-nice-card');
  niceCard.style.transition='opacity .3s';niceCard.style.opacity='1';
  await showFeatures('feat-nice',f.nice_to_have);

  await delay(300);
  if(f.pressure_flags.length){
    const flagsCard=$('flags-card');
    flagsCard.style.transition='opacity .3s';flagsCard.style.opacity='1';
    for(const fl of f.pressure_flags){
      await delay(150);
      const div=document.createElement('div');
      div.className=`flag-block flag-${fl.severity}`;
      div.innerHTML=`<div class="flag-icon">${fl.severity==='warning'?'⚠':'ℹ'}</div>
      <div class="flag-txt"><strong>${fl.feature}:</strong> ${fl.flag}</div>`;
      $('flags-list').appendChild(div);
    }
  }

  await delay(300);
  const roadCard=$('road-card');
  roadCard.style.transition='opacity .3s';roadCard.style.opacity='1';
  const byVer={};
  f.roadmap.forEach(r=>{if(!byVer[r.version])byVer[r.version]=[];byVer[r.version].push(r);});
  for(const[ver,items] of Object.entries(byVer)){
    const hdr=document.createElement('div');
    hdr.className='road-ver';
    hdr.innerHTML=`${ver}<div class="road-ver-sep"></div>`;
    $('road-list').appendChild(hdr);
    for(const r of items){
      await delay(100);
      const div=document.createElement('div');
      div.className='road-item';
      div.innerHTML=`<span><span class="ri-n">${r.name}</span><span class="ri-w">— ${r.why_parked}</span></span>`;
      $('road-list').appendChild(div);
    }
  }

  await delay(300);
  $('feat-cta').classList.remove('hidden');
  animating=false;
}

function buildPrompts(){
  const prompts=d().prompts;
  const chunks=d().chunks;
  const agentNames={cursor:'Cursor',claude_code:'Claude Code',windsurf:'Windsurf',bolt:'Bolt',lovable:'Lovable',v0:'v0'};
  const agentName=agentNames[dec.agent||d().agent.recommended];

  const blocks=prompts.map(p=>{
    const chunk=chunks.find(c=>c.id===p.chunk_id);
    return `<div class="prompt-block" id="pb-${p.chunk_id}">
      <div class="prompt-hdr" onclick="togglePrompt(${p.chunk_id})">
        <div class="prompt-cnum">${p.chunk_id}</div>
        <div class="prompt-ttl">${chunk?chunk.title:'Chunk '+p.chunk_id}</div>
        <button class="copy-btn" id="cpbtn-${p.chunk_id}" onclick="event.stopPropagation();copyPrompt(${p.chunk_id})">Copy</button>
      </div>
      <div class="prompt-body">
        <div class="prompt-txt" id="pt-${p.chunk_id}">${p.prompt}</div>
      </div>
    </div>`;
  }).join('');

  return `
  ${narrationCard('prompts')}
  <div class="phase-eyebrow">Phase 06 · Prompt Generation</div>
  <div class="phase-title">Your agent-ready prompts ${qBtn('prompts')}</div>
  <div class="phase-desc">One prompt per chunk, formatted for <strong style="color:var(--amber2)">${agentName}</strong>. Expand to preview, copy to paste directly into your agent.</div>

  <div class="prompt-tip">
    <div class="prompt-tip-icon">💡</div>
    <div class="prompt-tip-body"><strong>How to use these:</strong> Start with Chunk 01. Copy the prompt, paste into ${agentName}, and build until every done-when item is complete. Return here for Chunk 02. Never skip ahead — each chunk builds on the last.</div>
  </div>

  ${blocks}

  <div class="btn-row" style="margin-top:1.25rem">
    <button class="btn btn-primary" onclick="advance('launch')">Ready — go to launch checklist →</button>
    <button class="btn btn-ghost" onclick="goPhase('chunks')">← Back</button>
  </div>`;
}

function togglePrompt(id){$('pb-'+id).classList.toggle('open')}
function copyPrompt(id){
  const txt=$('pt-'+id).textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=$('cpbtn-'+id);
    btn.textContent='Copied!';btn.classList.add('done');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('done');},2000);
  });
}

function buildLaunch(){
  const lc=d().launch_checklist;
  if(!clState[ideaKey])clState[ideaKey]={};
  const state=clState[ideaKey];

  let total=0,checked=0;
  lc.categories.forEach(cat=>cat.items.forEach((_,i)=>{
    const k=`${cat.name}-${i}`;total++;
    if(state[k])checked++;
  }));
  const pct=total?Math.round((checked/total)*100):0;

  const cats=lc.categories.map(cat=>`
    <div class="lc-cat">
      <div class="lc-hdr">
        <div class="lc-name">${cat.name}</div>
        ${cat.mandatory?`<span class="lc-badge-req">Required</span>`:`<span class="lc-badge-opt">Recommended</span>`}
      </div>
      <div class="lc-items">
        ${cat.items.map((item,i)=>{
          const k=`${cat.name}-${i}`;
          const on=state[k]||false;
          return `<div class="lc-item">
            <div class="lc-cb ${on?'on':''}" id="lcb-${k}" onclick="toggleCL('${k}')"></div>
            <div>
              <div class="lc-task ${on?'done':''}" id="lct-${k}" onclick="toggleCL('${k}')">${item.task}</div>
              <div class="lc-explain">${item.explanation}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');

  const roadmap=d().features.roadmap.map(r=>`
    <div class="rm-item">
      <span class="rm-ver">${r.version}</span>
      <span class="rm-name">${r.name}</span>
      <span class="rm-why">— ${r.why_parked}</span>
    </div>`).join('');

  return `
  ${narrationCard('launch')}
  <div class="phase-eyebrow">Phase 07 · Launch Checklist</div>
  <div class="phase-title">Ship it ${qBtn('launch')}</div>
  <div class="phase-desc">Everything to check before going live. Required items must be complete — the rest is strongly recommended.</div>

  <div class="progress-ring-wrap">
    <div>
      <div class="pct-label">${pct}%</div>
      <div class="pct-sub">${checked} of ${total} complete</div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:${pct}%"></div></div>
  </div>

  ${cats}

  <div class="roadmap-card" style="margin-top:.875rem">
    <div class="roadmap-title">Your v2 roadmap</div>
    ${roadmap}
  </div>

  <div class="btn-row" style="margin-top:1.25rem">
    <button class="btn btn-primary" onclick="exportMD()">Export build plan (.md) ↓</button>
    <button class="btn btn-ghost" onclick="goPhase('prompts')">← Back to prompts</button>
  </div>`;
}

function toggleCL(k){
  if(!clState[ideaKey])clState[ideaKey]={};
  clState[ideaKey][k]=!clState[ideaKey][k];
  const on=clState[ideaKey][k];
  $('lcb-'+k).classList.toggle('on',on);
  $('lct-'+k).classList.toggle('done',on);
  // update progress
  const lc=d().launch_checklist;
  let total=0,checked=0;
  lc.categories.forEach(cat=>cat.items.forEach((_,i)=>{
    const key=`${cat.name}-${i}`;total++;
    if(clState[ideaKey][key])checked++;
  }));
  const pct=Math.round((checked/total)*100);
  const fill=$('prog-fill');
  if(fill){fill.style.width=pct+'%';}
  const lbl=document.querySelector('.pct-label');if(lbl)lbl.textContent=pct+'%';
  const sub=document.querySelector('.pct-sub');if(sub)sub.textContent=`${checked} of ${total} complete`;
}

// ── FEATURE MOVE BETWEEN TIERS ──
// featureState holds current bucket assignments per ideaKey
let featureState = {};

function initFeatureState() {
  const f = d().features;
  featureState[ideaKey] = {
    core: f.core.map((fi,i) => ({...fi, _id: ideaKey+'core'+i})),
    should_have: f.should_have.map((fi,i) => ({...fi, _id: ideaKey+'should'+i})),
    nice_to_have: f.nice_to_have.map((fi,i) => ({...fi, _id: ideaKey+'nice'+i})),
  };
}

function getFeatureState() {
  if (!featureState[ideaKey]) initFeatureState();
  return featureState[ideaKey];
}

function moveFeature(id, fromBucket, toBucket) {
  const state = getFeatureState();
  const idx = state[fromBucket].findIndex(f => f._id === id);
  if (idx === -1) return;
  const [fi] = state[fromBucket].splice(idx, 1);
  state[toBucket].push(fi);
  rerenderFeatures();
}

function removeFeature(id, bucket) {
  const state = getFeatureState();
  const idx = state[bucket].findIndex(f => f._id === id);
  if (idx !== -1) state[bucket].splice(idx, 1);
  rerenderFeatures();
}

function rerenderFeatures() {
  const state = getFeatureState();

  function renderBucket(containerId, bucket, otherBuckets) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = '';
    state[bucket].forEach(fi => {
      const div = document.createElement('div');
      div.className = 'fi';
      div.draggable = true;
      div.dataset.id = fi._id;
      div.dataset.bucket = bucket;

      const moveOptions = otherBuckets.map(b => {
        const labels = {core:'→ Core', should_have:'→ Should have', nice_to_have:'→ Nice to have'};
        return `<button class="fi-move-btn" onclick="event.stopPropagation();moveFeature('${fi._id}','${bucket}','${b}')">${labels[b]}</button>`;
      }).join('');

      div.innerHTML = `
        <span class="fi-cx cx-${fi.complexity}">${fi.complexity}</span>
        <div style="flex:1">
          <div class="fi-name">${fi.name}</div>
          <div class="fi-desc">${fi.description}</div>
          <div style="display:flex;gap:4px;margin-top:.5rem;flex-wrap:wrap">${moveOptions}</div>
        </div>
        <span class="fi-remove" onclick="event.stopPropagation();removeFeature('${fi._id}','${bucket}')" title="Remove">×</span>`;

      // drag events
      div.addEventListener('dragstart', e => { e.dataTransfer.setData('id', fi._id); e.dataTransfer.setData('bucket', bucket); div.classList.add('dragging'); });
      div.addEventListener('dragend', () => div.classList.remove('dragging'));
      el.appendChild(div);
    });

    // drop zone
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag-over');
      const id = e.dataTransfer.getData('id');
      const from = e.dataTransfer.getData('bucket');
      if (from !== bucket) moveFeature(id, from, bucket);
    });
  }

  renderBucket('feat-core', 'core', ['should_have','nice_to_have']);
  renderBucket('feat-should', 'should_have', ['core','nice_to_have']);
  renderBucket('feat-nice', 'nice_to_have', ['core','should_have']);
}

function formatPromptForAgent(rawPrompt, chunkTitle, chunkId, totalChunks, agentKey) {
  if (agentKey !== 'claude_code') return rawPrompt;

  return `<task>
  Build Chunk ${chunkId} of ${totalChunks}: ${chunkTitle}
</task>

<context>
  This is part of a structured vibe coding build plan generated by Vibestudio.
  Each chunk builds on the previous ones. Do not refactor or change anything
  from previous chunks unless explicitly asked. Focus only on what this chunk
  specifies.
</context>

<instructions>
${rawPrompt.split('\n').map(l => '  ' + l).join('\n')}
</instructions>

<constraints>
  - Only build what is specified in this chunk
  - Do not add features, routes, or components not mentioned here
  - If you are unsure about anything, implement the simplest correct version
  - After completing, list what was built and confirm the done-when items
</constraints>`;
}

function buildPrompts() {
  const prompts = d().prompts;
  const chunks = d().chunks;
  const agentKey = dec.agent || d().agent.recommended;
  const agentNames = {cursor:'Cursor',claude_code:'Claude Code',windsurf:'Windsurf',bolt:'Bolt',lovable:'Lovable',v0:'v0'};
  const agentName = agentNames[agentKey];

  const blocks = prompts.map(p => {
    const chunk = chunks.find(c => c.id === p.chunk_id);
    const formattedPrompt = formatPromptForAgent(
      p.prompt + uiConversationSuffix(ideaKey, p.chunk_id),
      chunk ? chunk.title : 'Chunk ' + p.chunk_id,
      p.chunk_id,
      chunks.length,
      agentKey
    );
    return `<div class="prompt-block" id="pb-${p.chunk_id}">
      <div class="prompt-hdr" onclick="togglePrompt(${p.chunk_id})">
        <div class="prompt-cnum">${p.chunk_id}</div>
        <div class="prompt-ttl">${chunk ? chunk.title : 'Chunk ' + p.chunk_id}</div>
        <button class="copy-btn" id="cpbtn-${p.chunk_id}" onclick="event.stopPropagation();copyPrompt(${p.chunk_id},'${escQ(formattedPrompt)}')">Copy</button>
      </div>
      <div class="prompt-body">
        <div class="prompt-txt" id="pt-${p.chunk_id}">${formattedPrompt.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>

  return `

    <div class="prompt-tip-body"><strong>How to use these:</strong> Start with Chunk 01. Copy the prompt, paste into ${agentName}, and build until every done-when item is complete. Return here for Chunk 02. Never skip ahead — each chunk builds on the last.${agentKey === 'claude_code' ? ' <strong>Claude-optimised:</strong> Prompts use XML structure for best results with Claude Code.' : ''}</div>
  </div>

  ${blocks}

  <div class="btn-row" style="margin-top:1.25rem">
    <button class="btn btn-primary" onclick="advance('launch')">Ready — go to launch checklist →</button>
    <button class="btn btn-ghost" onclick="goPhase('chunks')">← Back</button>
  </div>`;
}

function escQ(s) {
  // Store prompt text as data attribute - encode for HTML attribute
  return ''; // we'll use a different copy mechanism
}

function copyPrompt(id, _unused) {
  // Get the raw text from the pre element (already rendered)
  const el = document.getElementById('pt-'+id);
  if (!el) return;
  // Get text content, decode HTML entities
  const tmp = document.createElement('div');
  tmp.innerHTML = el.innerHTML;
  const text = tmp.textContent || tmp.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('cpbtn-'+id);
    btn.textContent = 'Copied!'; btn.classList.add('done');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('done'); }, 2000);
  });
}
